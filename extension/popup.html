<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <span class="icon">🦊</span>
                <h1>CaelestiaSites</h1>
            </div>
            <div id="status-indicator" class="status offline"></div>
        </header>

        <main>
            <div class="section">
                <div class="label">Status</div>
                <div id="status-text">Disconnected</div>
            </div>

            <div class="section">
                <div class="label">Active Palette</div>
                <div id="palette-preview" class="palette">
                    <!-- Colors will be injected here -->
                </div>
            </div>

            <button id="reconnect-btn" class="primary-btn">Reconnect Host</button>
        </main>

        <footer>
            <button id="github-btn" class="secondary-btn">View on GitHub</button>
            <p>Ready to theme your web.</p>
        </footer>
    </div>
    <script src="popup.js"></script>
</body>
</html>
